<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Text Align</title>
  </head>
  <body>
    <div class="container">
      <div class="box"><p>Hello World</p></div>
      <div class="button-box">
        <button type="button" title="Set Your Text Into Left Side">Left</button>
        <button type="button" title="Set Your Text Into Center">Center</button>
        <button type="button" title="Set Your Text Into Right Side">Right</button>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
